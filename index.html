<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta name="base:app_id" content="6a4a5dd32fba975b6bdf8064" />
        <title>Pac-Man Base</title>
        <link rel="stylesheet" href="style.css">
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet" />
    </head>
    <body>
        <div class="container">
            <canvas id="board"></canvas>
            <div class="side-bar">
                <div>
                    <h1>PACMAN</h1>
                    <p>Lives: <span id="lives">3</span></p>
                    <p>Score: <span id="score">0</span></p>
                </div>

                <div class="mobile-controls" aria-label="Mobile controls">
                    <button class="control-btn" data-action="left" type="button">◀</button>
                    <button class="control-btn" data-action="down" type="button">▼</button>
                    <button class="control-btn" data-action="up" type="button">▲</button>
                    <button class="control-btn" data-action="right" type="button">▶</button>
                </div>

                <div class="wallet-info" id="wallet-info">
                    <button id="connect-wallet" class="connect-btn">
                        Connect Wallet
                    </button>
                    <p id="wallet-address" style="display: none; font-size: 10px; margin-top: 10px"></p>
                    <p id="transaction-status" style="display: none; font-size: 10px; color: orange; margin-top: 5px"></p>
                </div>

                <button class="play-btn" id="play" style="display: none">Play</button>
            </div>
        </div>
        <script type="module" src="/scripts/index.js"></script>
    </body>
</html>
